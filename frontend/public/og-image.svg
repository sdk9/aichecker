<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="280" r="420" fill="url(#glow)"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.2"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Shield logo -->
  <g transform="translate(560, 150)">
    <rect width="80" height="80" rx="16" fill="#4f46e5"/>
    <path d="M40 10L64 20V38C64 52 53.5 64 40 67.5C26.5 64 16 52 16 38V20L40 10Z" fill="#6366f1" opacity="0.6"/>
    <polyline points="26,37 35,46 55,28" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="310" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="-2">Veritas<tspan fill="url(#titleGrad)">AI</tspan></text>
  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" fill="#94a3b8" letter-spacing="0.5">AI Content Detection &amp; Verification</text>
  <!-- Feature pills -->
  <rect x="200" y="430" width="200" height="40" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="300" y="456" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8">Images</text>
  <rect x="420" y="430" width="200" height="40" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="520" y="456" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8">Documents</text>
  <rect x="640" y="430" width="200" height="40" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="740" y="456" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8">Text &amp; PDFs</text>
  <rect x="860" y="430" width="140" height="40" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="930" y="456" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8">Free Plan</text>
  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="#475569">veritasartificialis.com</text>
</svg>
